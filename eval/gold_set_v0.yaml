# Athena-Benchmark v0 — Gold-Set für sachpolitische Faktenfragen
#
# Zweck
# -----
# Vergleichbare Faktentreue zwischen Athena (RAG + Tier-Klassifikation) und
# Standard-LLMs ohne RAG (ChatGPT, Claude, plain Mistral) messen. Jede Frage
# hat eine konkrete, aus einer Tier-1-Quelle verifizierbare Antwort.
#
# Bewertung pro Antwort
# ---------------------
#   fact_hit:   enthält die Antwort eine der Strings aus 'accept'?     {0,1}
#   hallucinated_url: zitiert die Antwort eine URL, die nicht aufrufbar/falsch ist? {0,1}
#   source_tier_avg: über zitierte Quellen — was ist deren Median-Tier? {1..3 / "none"}
#   declines_uncertain: hat das Modell bei dünner Faktenlage ehrlich passt gesagt? {0,1}
#
# Status-Flag pro Item
# --------------------
#   verified    — Antwort + Quelle händisch gegen die Tier-1-Quelle geprüft
#   needs_check — Entwurf, vor Veröffentlichung des Benchmarks zu verifizieren
#                 (Datum, Wortlaut, URL-Erreichbarkeit)
#
# Versionierung: gold_set_v0 ist der erste, kleine Datensatz. Bei größeren
# Änderungen neue Version (v1, v2, …) — Vergleichbarkeit über die Zeit.

version: v0
created: 2026-06-09
